server_name: vms-nats
port: 4222
http: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: 512M
  max_file_store: 10G
}

authorization {
  users = [
    { user: "vms_core", password: "$VMS_NATS_CORE_PASSWORD", permissions: { publish: "vms.events.>", subscribe: "vms.events.>" } },
    { user: "vms_agents", password: "$VMS_NATS_AGENT_PASSWORD", permissions: { publish: "vms.events.>", subscribe: "vms.events.>" } }
  ]
}
